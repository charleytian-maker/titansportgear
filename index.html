<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Sport Gear - Premium Export Quality</title>
    <!-- 引入 Tailwind CSS 样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Netlify Identity 脚本，用于后台登录验证 -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- 导航栏 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href=" " class="text-2xl font-bold text-red-600" id="nav-brand">Loading...</a >
            <nav class="space-x-6 font-medium">
                <a href="index.html" class="text-red-600">Home</a >
                <a href="products.html" class="text-gray-600 hover:text-red-600">Products</a >
            </nav>
        </div>
    </header>

    <!-- Hero 巨幕区 -->
    <section class="bg-slate-900 text-white py-24 px-4 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-6" id="hero-title">Loading Elite Gear...</h1>
            <p class="text-xl text-gray-300 mb-8" id="hero-subtitle">...</p >
            <a href="products.html" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-lg transition">View Our Products</a >
        </div>
    </section>

    <!-- 关于我们区 -->
    <section class="py-16 max-w-4xl mx-auto px-4">
        <h2 class="text-3xl font-bold text-center mb-8 text-gray-900">About Our Company</h2>
        <p class="text-lg leading-relaxed text-gray-600 text-center" id="about-text">...</p >
    </section>

    <!-- 页脚 -->
    <footer class="bg-gray-900 text-gray-400 py-12 px-4 mt-12">
        <div class="max-w-6xl mx-auto text-center space-y-4">
            <p id="footer-text">© 2026 Titan Sport Gear. All Rights Reserved.</p >
            <p>Contact Us: <a href="#" id="contact-email" class="text-red-500 underline">...</a ></p >
        </div>
    </footer>

    <!-- 动态读取数据脚本 -->
    <script>
  document.addEventListener("DOMContentLoaded", function() {
    // 1. 尝试读取整合的 products.json
    fetch('/data/products.json')
      .then(response => {
        if (!response.ok) throw new Error('Main products.json not found');
        return response.json();
      })
      .then(data => {
        // 判断数据是嵌套在 product_list 里，还是直接就是数组
        let list = [];
        if (data && data.product_list) {
          list = data.product_list;
        } else if (Array.isArray(data)) {
          list = data;
        } else if (typeof data === 'object') {
          // 如果后台把数据单独存成了对象，则放入数组
          list = [data];
        }
        
        renderProducts(list);
      })
      .catch(err => {
        console.warn('Main json read failed, trying backup path...', err);
        
        // 2. 备用兜底路径：如果你的后台将单个产品独立生成了文件，直接去读篮球文件
        fetch('/data/products/rubber-basketball.json')
          .then(res => res.json())
          .then(singleProduct => {
            if (singleProduct) {
              renderProducts([singleProduct]);
            }
          })
          .catch(backupErr => {
            console.error('All fetch paths failed:', backupErr);
            document.getElementById('products-container').innerHTML = 
              '<p class="status-text" style="color: #d32f2f;">Failed to load products. Please check if data exists.</p >';
          });
      });

    // 🎨 核心渲染函数
    function renderProducts(productList) {
      const container = document.getElementById('products-container');
      container.innerHTML = ''; // 清空加载提示

      if (!productList || productList.length === 0) {
        container.innerHTML = '<p class="status-text">Our catalog is being updated. New products coming soon!</p >';
        return;
      }

      productList.forEach(product => {
        // 自动修复 Decap CMS 产生的各种图片路径变体 (images/uploads 或 public/images)
        let finalImageUrl = product.image;
        if (finalImageUrl) {
          if (finalImageUrl.startsWith('public/')) {
            finalImageUrl = finalImageUrl.replace('public/', '/');
          } else if (!finalImageUrl.startsWith('/')) {
            finalImageUrl = '/' + finalImageUrl;
          }
        }

        const cardHTML = `
          <div class="product-card">
            <div class="product-img-wrapper">
              < img src="${finalImageUrl || '/images/placeholder.jpg'}" alt="${product.title || 'Sport Gear'}" class="product-img" loading="lazy">
            </div>
            <div class="product-info">
              <h3 class="product-title" title="${product.title || ''}">${product.title || 'Premium Product'}</h3>
              
              <div class="product-meta-box">
                <div class="product-meta-item"><strong>MOQ:</strong> <span>${product.moq || '500 PCS'}</span></div>
                <div class="product-meta-item"><strong>Supply:</strong> <span>${product.supply_ability || '10,000 PCS/Month'}</span></div>
              </div>
              
              <p class="product-desc" title="${product.description || ''}">${product.description || 'High quality equipment for international trade export.'}</p >
              
              <a href=" '')}" class="inquiry-btn">Inquiry Now</a >
            </div>
          </div>
        `;
        container.innerHTML += cardHTML;
      });
    }
  });
</script>
</body>
</html>
