<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Sport Gear - Premium Export Quality</title>
    <!-- 引入 Tailwind CSS 样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Netlify Identity 脚本，用于后台登录验证 -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- 导航栏 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href=" " class="text-2xl font-bold text-red-600" id="nav-brand">Loading...</a >
            <nav class="space-x-6 font-medium">
                <a href="index.html" class="text-red-600">Home</a >
                <a href="products.html" class="text-gray-600 hover:text-red-600">Products</a >
            </nav>
        </div>
    </header>

    <!-- Hero 巨幕区 -->
    <section class="bg-slate-900 text-white py-24 px-4 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-6" id="hero-title">Loading Elite Gear...</h1>
            <p class="text-xl text-gray-300 mb-8" id="hero-subtitle">...</p >
            <a href="products.html" class="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-lg transition">View Our Products</a >
        </div>
    </section>

    <!-- 关于我们区 -->
    <section class="py-16 max-w-4xl mx-auto px-4">
        <h2 class="text-3xl font-bold text-center mb-8 text-gray-900">About Our Company</h2>
        <p class="text-lg leading-relaxed text-gray-600 text-center" id="about-text">...</p >
    </section>

    <!-- 页脚 -->
    <footer class="bg-gray-900 text-gray-400 py-12 px-4 mt-12">
        <div class="max-w-6xl mx-auto text-center space-y-4">
            <p id="footer-text">© 2026 Titan Sport Gear. All Rights Reserved.</p >
            <p>Contact Us: <a href="#" id="contact-email" class="text-red-500 underline">...</a ></p >
        </div>
    </footer>

    <!-- 动态读取数据脚本 -->
    <script>
        fetch('/data/company.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('nav-brand').innerText = data.company_name;
                document.getElementById('hero-title').innerText = data.hero_title;
                document.getElementById('hero-subtitle').innerText = data.hero_subtitle;
                document.getElementById('about-text').innerText = data.about_text;
                document.getElementById('contact-email').innerText = data.contact_email;
                document.getElementById('contact-email').href = "mailto:" + data.contact_email;
                document.getElementById('footer-text').innerText = `© 2026 ${data.company_name}. All Rights Reserved.`;
            }).catch(err => console.error("Error loading company data:", err));

        // 配合 Netlify Identity 登录重定向
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
                }
            });
        }
    </script>
</body>
</html>
