# =============================================
# 南京都梁商贸有限公司 · Decap CMS 配置文件
# 三语站 EN / DE / JA
# =============================================

backend:
  name: github
  repo: charleytian-mark/Tiansportgear
  branch: main  # 主分支是 master 的话改成 master

media_folder: "public/images"
public_folder: "/images"
locale: zh_Hans

collections:

  # 1. 首页 Hero（三语）
  - name: "homepage"
    label: "首页内容"
    files:
      - name: "hero_en"
        label: "首页 · 英文版"
        file: "data/homepage/hero_en.json"
        fields:
          - { label: "大标题", name: "title", widget: "string" }
          - { label: "副标题", name: "subtitle", widget: "string" }
          - { label: "按钮文字", name: "cta_text", widget: "string" }
          - { label: "按钮链接", name: "cta_link", widget: "string" }
          - { label: "背景图片", name: "hero_image", widget: "image" }

      - name: "hero_de"
        label: "首页 · 德文版"
        file: "data/homepage/hero_de.json"
        fields:
          - { label: "大标题", name: "title", widget: "string" }
          - { label: "副标题", name: "subtitle", widget: "string" }
          - { label: "按钮文字", name: "cta_text", widget: "string" }
          - { label: "按钮链接", name: "cta_link", widget: "string" }
          - { label: "背景图片", name: "hero_image", widget: "image" }

      - name: "hero_ja"
        label: "首页 · 日文版"
        file: "data/homepage/hero_ja.json"
        fields:
          - { label: "大标题", name: "title", widget: "string" }
          - { label: "副标题", name: "subtitle", widget: "string" }
          - { label: "按钮文字", name: "cta_text", widget: "string" }
          - { label: "按钮链接", name: "cta_link", widget: "string" }
          - { label: "背景图片", name: "hero_image", widget: "image" }

  # 2. 产品中心（10品类 × 3语言，每类15张图）
  - name: "products"
    label: "产品中心"
    folder: "data/products"
    create: true
    slug: "{{category}}_{{lang}}"
    fields:
      - label: "品类"
        name: "category"
        widget: "select"
        options:
          - { label: "篮球", value: "basketball" }
          - { label: "足球", value: "football" }
          - { label: "排球", value: "volleyball" }
          - { label: "操场球", value: "playground_ball" }
          - { label: "橄榄球", value: "american_football" }
          - { label: "手球", value: "handball" }
          - { label: "棒垒球", value: "baseball" }
          - { label: "网球", value: "tennis" }
          - { label: "羽毛球", value: "badminton" }
          - { label: "沙滩球拍", value: "beach_paddle" }

      - label: "语言"
        name: "lang"
        widget: "select"
        options:
          - { label: "英文 EN", value: "en" }
          - { label: "德文 DE", value: "de" }
          - { label: "日文 JA", value: "ja" }

      - { label: "品类页面标题", name: "page_title", widget: "string" }
      - { label: "品类描述", name: "description", widget: "text" }

      - label: "产品列表（最多15个）"
        name: "products"
        widget: "list"
        max: 15
        fields:
          - { label: "产品名称", name: "name", widget: "string" }
          - { label: "产品图片", name: "image", widget: "image" }
          - { label: "产品描述", name: "desc", widget: "text", required: false }
          - { label: "规格/型号", name: "spec", widget: "string", required: false }
          - { label: "询价链接", name: "inquiry_url", widget: "string", required: false }

  # 3. 关于我们（三语）
  - name: "about"
    label: "关于我们"
    files:
      - name: "about_en"
        label: "关于我们 · 英文"
        file: "data/about/about_en.json"
        fields:
          - { label: "页面标题", name: "title", widget: "string" }
          - { label: "公司简介", name: "intro", widget: "markdown" }
          - { label: "公司图片", name: "image", widget: "image", required: false }
          - label: "核心优势"
            name: "advantages"
            widget: "list"
            fields:
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "desc", widget: "string" }

      - name: "about_de"
        label: "关于我们 · 德文"
        file: "data/about/about_de.json"
        fields:
          - { label: "页面标题", name: "title", widget: "string" }
          - { label: "公司简介", name: "intro", widget: "markdown" }
          - { label: "公司图片", name: "image", widget: "image", required: false }
          - label: "核心优势"
            name: "advantages"
            widget: "list"
            fields:
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "desc", widget: "string" }

      - name: "about_ja"
        label: "关于我们 · 日文"
        file: "data/about/about_ja.json"
        fields:
          - { label: "页面标题", name: "title", widget: "string" }
          - { label: "公司简介", name: "intro", widget: "markdown" }
          - { label: "公司图片", name: "image", widget: "image", required: false }
          - label: "核心优势"
            name: "advantages"
            widget: "list"
            fields:
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "desc", widget: "string" }

  # 4. 车间展示
  - name: "factory"
    label: "车间展示"
    files:
      - name: "factory_gallery"
        label: "车间图片库"
        file: "data/factory/gallery.json"
        fields:
          - label: "车间图片"
            name: "images"
            widget: "list"
            fields:
              - { label: "图片", name: "src", widget: "image" }
              - { label: "说明（EN）", name: "caption_en", widget: "string", required: false }
              - { label: "说明（DE）", name: "caption_de", widget: "string", required: false }
              - { label: "说明（JA）", name: "caption_ja", widget: "string", required: false }

  # 5. 证书
  - name: "certificates"
    label: "证书"
    files:
      - name: "cert_list"
        label: "证书列表"
        file: "data/certificates/list.json"
        fields:
          - label: "证书列表"
            name: "certs"
            widget: "list"
            fields:
              - { label: "证书名称（EN）", name: "name_en", widget: "string" }
              - { label: "证书名称（DE）", name: "name_de", widget: "string", required: false }
              - { label: "证书名称（JA）", name: "name_ja", widget: "string", required: false }
              - { label: "证书图片", name: "image", widget: "image" }

  # 6. 联系我们
  - name: "contact"
    label: "联系我们"
    files:
      - name: "contact_info"
        label: "联系信息"
        file: "data/contact/info.json"
        fields:
          - { label: "WhatsApp 号码", name: "whatsapp", widget: "string" }
          - { label: "邮箱", name: "email", widget: "string" }
          - { label: "公司地址（EN）", name: "address_en", widget: "string" }
          - { label: "公司地址（DE）", name: "address_de", widget: "string", required: false }
          - { label: "公司地址（JA）", name: "address_ja", widget: "string", required: false }
          - { label: "询价表单标题（EN）", name: "form_title_en", widget: "string" }
          - { label: "询价表单标题（DE）", name: "form_title_de", widget: "string", required: false }
          - { label: "询价表单标题（JA）", name: "form_title_ja", widget: "string", required: false }
