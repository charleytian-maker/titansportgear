backend:
  name: git-gateway
  branch: main

# 根据你项目是 Astro 还是 Hugo，图片目录通常会自动映射到对应的公共文件夹
media_folder: "public/images"
public_folder: "/images"

# ----------------------------------------------------------------
# 管理项配置 (Collections)
# ----------------------------------------------------------------
collections:

  # 1. 🏢 公司信息管理 (Company Info) - 单文件模式
  - name: "company_info"
    label: "🏢 公司信息管理 (Company Info)"
    delete: false
    editor:
      preview: false
    files:
      - name: "about_page"
        label: "首页及关于我们"
        file: "content/company_info/about.md"
        fields:
          - { label: "公司名称 (Company Name)", name: "title", widget: "string" }
          - { label: "公司英文简介 (About Us Summary)", name: "description", widget: "text" }
          - { label: "联系邮箱 (Email)", name: "email", widget: "string" }
          - { label: "联系电话 (Phone)", name: "phone", widget: "string", required: false }
          - { label: "公司地址 (Address)", name: "address", widget: "string", required: false }

  # 2. 📦 产品中心 (Products) - 适合原生静态网的 JSON 列表模式
  - name: "products"
    label: "📦 产品中心 (Products)"
    file: "public/data/products.json" # 后台数据会直接保存在这个 JSON 文件里
    fields:
      - label: "产品列表 (Product List)"
        name: "product_list"
        widget: "list"
        summary: "{{fields.title}}"
        fields:
          - { label: "产品名称 (Product Name)", name: "title", widget: "string" }
          - { label: "产品图片 (Product Image)", name: "image", widget: "image" }
          - { label: "最小起订量 (MOQ)", name: "moq", widget: "string", default: "500 PCS" }
          - { label: "供货能力 (Supply Ability)", name: "supply_ability", widget: "string", default: "10,000 PCS / Month" }
          - { label: "产品简短描述 (Description)", name: "description", widget: "text" }

  # 3. 📰 博客与新闻 (Blogs & News) - 🆕 文件夹模式
  - name: "blog"
    label: "📰 博客与新闻 (Blogs & News)"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "文章标题 (Title)", name: "title", widget: "string" }
      - { label: "发布日期 (Date)", name: "date", widget: "datetime" }
      - { label: "SEO 简述 (Description)", name: "description", widget: "text", hint: "展示在 Google 搜索结果和列表页的摘要" }
      - { label: "封面图片 (Featured Image)", name: "featured_image", widget: "image" }
      - { label: "标签分类 (Tags)", name: "tags", widget: "list", default: ["Industry News"] }
      - { label: "正文内容 (Content)", name: "body", widget: "markdown" }

  # 4. 👥 客户评价 (Testimonials) - 🆕 文件夹模式
  - name: "testimonials"
    label: "👥 客户评价 (Testimonials)"
    folder: "content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "客户姓名/职位 (Name/Title)", name: "title", widget: "string", hint: "例如: John Doe (Purchase Manager)" }
      - { label: "公司名称/国家 (Company/Country)", name: "company", widget: "string", hint: "例如: Apex Sports, USA" }
      - { label: "客户头像 (Avatar)", name: "avatar", widget: "image", required: false }
      - { label: "星级评价 (Rating)", name: "rating", widget: "select", options: ["5 Stars", "4 Stars"], default: "5 Stars" }
      - { label: "评价内容 (Feedback)", name: "body", widget: "text" }

  # 5. ❓ 常见问题 (FAQ) - 🆕 文件夹模式（规避之前的 files 报错）
  - name: "faq"
    label: "❓ 常见问题 (FAQ)"
    folder: "content/faq"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "问题卡片标题 (如 MOQ FAQ)", name: "title", widget: "string" }
      - { label: "分类", name: "category", widget: "select", options: ["Product", "Order & Payment", "Shipping", "Customization"] }
      - { label: "英文问题 (Question)", name: "question", widget: "string" }
      - { label: "英文回答 (Answer)", name: "answer", widget: "text" }

  # 6. 🏅 资质证书与实力 (Certificates & Factory) - 🆕 文件夹模式
  - name: "certificates"
    label: "🏅 资质证书与实力 (Certificates & Factory)"
    folder: "content/certificates"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "证书或车间名称", name: "title", widget: "string", hint: "例如: CE Certificate 或 Production Line" }
      - { label: "分类 (Category)", name: "type", widget: "select", options: ["Certificate", "Factory Tour"] }
      - { label: "展示图片 (Image)", name: "image", widget: "image" }
      - { label: "简要说明 (Description)", name: "description", widget: "string", required: false }
